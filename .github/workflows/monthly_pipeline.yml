name: Monthly FipeZAP ETL

on:
  schedule:
    # Rodar todos os dias às 17h UTC (14h Horário de Brasília)
    - cron: '0 17 * * *'
  workflow_dispatch: # Permite rodar manualmente no GitHub

jobs:
  run-etl:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Instalar mapshaper CLI se necessário para a simplificação de geojsons
        npm install -g mapshaper

    - name: Create credentials directory and file
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: |
        mkdir -p credentials
        echo "$GOOGLE_CREDENTIALS" > credentials/projeto-mkt-buyer-experience-ab8bb5499148.json
        
    - name: Run Pipeline
      run: |
        chmod +x run_pipeline.sh
        ./run_pipeline.sh

    - name: Upload Validation Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: validation-report
        path: data/validation_report.txt
